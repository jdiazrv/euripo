      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function parseDate(input) {
      if (typeof input !== "string") return null;

      const trimmed = input.replace(/_/g, "").trim();
      const regex = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/;
      const match = trimmed.match(regex);

      if (!match) return null;

      const day = Number(match[1]);
      const month = Number(match[2]) - 1;
      const year = Number(match[3]);

      const date = new Date(year, month, day);
      const isValid =
        !Number.isNaN(date.getTime()) &&
        date.getDate() === day &&
        date.getMonth() === month &&
        date.getFullYear() === year;

      if (!isValid) return null;

      date.setHours(0, 0, 0, 0);
      return date;
    }

    function isDST(date) {
      const year = date.getFullYear();

      const march31 = new Date(year, 2, 31);
      const october31 = new Date(year, 9, 31);

      const lastSundayMarch = 31 - march31.getDay();
      const lastSundayOctober = 31 - october31.getDay();

      const dstStart = new Date(year, 2, lastSundayMarch, 0, 0, 0, 0);
      const dstEnd = new Date(year, 9, lastSundayOctober, 0, 0, 0, 0);

      return date >= dstStart && date < dstEnd;
    }

    function isNonOperatingDay(date) {
      return NON_OPERATING_WEEKDAYS.includes(date.getDay());
    }

    function formatDateTime(date) {
      const locale =
        currentLang === "el"
          ? "el-GR"
          : currentLang === "es"
          ? "es-ES"
          : "en-GB";

      return date.toLocaleString(locale, {
        year: "numeric",
        month: "long",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function getCycleReferenceLabel(daysSinceNewMoon) {
      const t = langData[currentLang];

      if (daysSinceNewMoon === 0) return `N=0 · ${t.cycleLabelNewMoon}`;
      if (daysSinceNewMoon === 15) return `N=15 · ${t.cycleLabelFullMoon}`;
      if (daysSinceNewMoon < 15) {
        return `N=${daysSinceNewMoon} · ${t.cycleLabelBeforeFull.replace("{n}", String(15 - daysSinceNewMoon))}`;
      }

      return `N=${daysSinceNewMoon} · ${t.cycleLabelAfterFull.replace("{n}", String(daysSinceNewMoon - 15))}`;
    }

    function buildReferenceDateTime(date, referenceTime = "21:30") {
      const [hours, minutes] = referenceTime.split(":").map(Number);
      return new Date(
        date.getFullYear(),
        date.getMonth(),
        date.getDate(),
        hours,
        minutes,
        0,
        0
      );
    }

    function getLunarPhaseInfo(date, referenceTime = "21:30") {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) {
        return {
          ok: false,
          type: "error",
          message: langData[currentLang].invalidDateFormat
        };
      }

      let lastNewMoon = null;
      let lastFullMoon = null;
      let nextFullMoon = null;
      const referenceDateTime = buildReferenceDateTime(date, referenceTime);

      const sortedNewMoons = [...newMoons].sort((a, b) => a.date - b.date);
      const sortedFullMoons = [...fullMoons].sort((a, b) => a.date - b.date);

      for (const phase of sortedNewMoons) {
        if (phase.date <= referenceDateTime) {
          lastNewMoon = phase.date;
        }
      }

      for (const phase of sortedFullMoons) {
        if (phase.date <= referenceDateTime) {
          lastFullMoon = phase.date;
        } else if (!nextFullMoon) {
          nextFullMoon = phase.date;
        }
      }

      if (!lastNewMoon || !lastFullMoon || !nextFullMoon) {
        return {
          ok: false,
          type: "error",
          message: langData[currentLang].noLunarData
        };
      }

      const daysSinceNewMoon = Math.round(
        (referenceDateTime - lastNewMoon) / DAY_IN_MS
      );

      return {
        ok: true,
        data: {
          inputDate: date,
          lastNewMoon,
          lastFullMoon,
          nextFullMoon,
          daysSinceNewMoon,
          isDST: isDST(date)
        }
      };
    }

    function getBridgeOpeningTime(daysSinceNewMoon, referenceTime = "21:30", dstActive = false) {
      const dayIndex = Math.max(0, Math.min(29, daysSinceNewMoon));
      const intervals = bridgeIntervals[dayIndex];

      if (
        daysSinceNewMoon < 0 ||
        daysSinceNewMoon > 29 ||
        !Array.isArray(intervals) ||
        intervals.length === 0
      ) {
        return {
          ok: false,
          message: langData[currentLang].irregularStream
        };
      }

      const [refHour, refMinute] = referenceTime.split(":").map(Number);
      // The table is in EET (UTC+2). When DST is active (EEST, UTC+3),
      // subtract 1 hour to convert the local reference time to EET for comparison.
      let refMinutes = refHour * 60 + refMinute;
      if (dstActive) {
        refMinutes -= 60;
        if (refMinutes < 0) refMinutes += 24 * 60;
      }

      for (const interval of intervals) {
        const [start, end] = interval.split("-");
        const [startHour, startMinute] = start.split(":").map(Number);
        const [endHour, endMinute] = end.split(":").map(Number);

        const startMinutes = startHour * 60 + startMinute;
        let endMinutes = endHour * 60 + endMinute;

        if (endMinutes < startMinutes) {
          endMinutes += 24 * 60;
        }

        const adjustedRef = refMinutes < startMinutes ? refMinutes + 24 * 60 : refMinutes;

        if (adjustedRef >= startMinutes && adjustedRef <= endMinutes) {
          let totalMinutes = endMinutes;

          if (dstActive) {
            totalMinutes += 60;
          }

          totalMinutes = totalMinutes % (24 * 60);

          const hours = String(Math.floor(totalMinutes / 60)).padStart(2, "0");
          const minutes = String(totalMinutes % 60).padStart(2, "0");

          return {
            ok: true,
            value: `${hours}:${minutes}${dstActive ? " (EEST)" : " (EET)"}`
          };
        }
      }

      return {
        ok: false,
        message: langData[currentLang].refTimeNotFound
      };
    }

    function calculateBridgeOpening(inputValue) {
      const parsedDate = parseDate(inputValue);

      if (!parsedDate) {
        return {
          status: "error",
          title: langData[currentLang].resultTitleError,
          message: langData[currentLang].invalidDateFormat
        };
      }

      const referenceTime = "21:30";
      const lunarInfoResult = getLunarPhaseInfo(parsedDate, referenceTime);

      if (!lunarInfoResult.ok) {
        return {
          status: "error",
          title: langData[currentLang].resultTitleError,
          message: lunarInfoResult.message
        };
      }

      const { inputDate, lastNewMoon, lastFullMoon, nextFullMoon, daysSinceNewMoon, isDST: dstActive } =
        lunarInfoResult.data;

      const timeResult = getBridgeOpeningTime(daysSinceNewMoon, referenceTime, dstActive);

      if (!timeResult.ok) {
        return {
          status: "error",
          title: langData[currentLang].resultTitleError,
          message: timeResult.message
        };
      }

      const weekday = inputDate.getDay();
      const closed = isNonOperatingDay(inputDate);
      const saturday = weekday === 6;

      const notes = [];

      if (saturday) {
        notes.push(langData[currentLang].saturdayWarning);
      } else if (closed) {
        notes.push(langData[currentLang].nonOperatingDay);
      }

      if (closed) {
        notes.push(langData[currentLang].olneCalendarNote);
      }

      const timeMatch = timeResult.value.match(/^(\d{2}):(\d{2})/);
      if (timeMatch) {
        const hour = Number(timeMatch[1]);
        if (!closed && hour >= 3 && hour < 6) {
          notes.push(langData[currentLang].earlyMorningNote);
        }
      }

      return {
        status: closed ? "warning" : "success",
        title: closed
          ? langData[currentLang].resultTitleWarning
          : langData[currentLang].resultTitleSuccess,
        data: {
          lastNewMoon: formatDateTime(lastNewMoon),
          lastFullMoon: formatDateTime(lastFullMoon),
          nextFullMoon: formatDateTime(nextFullMoon),
          daysSinceNewMoon,
          bridgeOpeningTime: timeResult.value,
          cycleReference: getCycleReferenceLabel(daysSinceNewMoon)
        },
        notes
      };
    }

    function renderResult(result) {
      const resultDiv = document.getElementById("result");

      if (!result || result.status === "error") {
        resultDiv.innerHTML = `
          <div class="result-box error">
            <p class="result-title">${langData[currentLang].resultTitleError}</p>
            <p>${result?.message || langData[currentLang].invalidDateFormat}</p>
          </div>
        `;
        return;
      }

      const notesHtml =
        Array.isArray(result.notes) && result.notes.length
          ? result.notes.map((note) => `<p class="small">${note}</p>`).join("")
          : "";

      resultDiv.innerHTML = `
        <div class="result-box ${result.status}">
          <p class="result-title">${result.title}</p>
          <p class="result-meta"><strong>${langData[currentLang].cycleReference}:</strong> ${result.data.cycleReference}</p>
          <p><strong>${langData[currentLang].lastNewMoon}:</strong> ${result.data.lastNewMoon}</p>
          <p><strong>${langData[currentLang].lastFullMoon}:</strong> ${result.data.lastFullMoon}</p>
          <p><strong>${langData[currentLang].nextFullMoon}:</strong> ${result.data.nextFullMoon}</p>
          <p><strong>${langData[currentLang].daysSinceNewMoon}:</strong> ${result.data.daysSinceNewMoon}</p>
          <p><strong class="highlight">${langData[currentLang].bridgeOpeningTime}:</strong></p>
          <p class="result-main-time">${result.data.bridgeOpeningTime}</p>
          ${notesHtml}
        </div>
      `;
    }

    function calculate() {
      const inputValue = document.getElementById("dateInput").value;
      const result = calculateBridgeOpening(inputValue);
      renderResult(result);
    }

    function applyLanguage() {
      const t = langData[currentLang];

      document.documentElement.lang = currentLang;
      document.querySelector('meta[name="description"]').setAttribute("content", t.metaDescription);
      document.getElementById("title").textContent = t.title;
      document.getElementById("lede").textContent = t.lede;
      document.getElementById("languageLabel").textContent = t.languageLabel;
      document.getElementById("dateLabel").textContent = t.dateLabel;
      document.getElementById("calculateBtn").textContent = t.calculate;
      document.getElementById("note").textContent = t.note;
      document.getElementById("infoTitle").textContent = t.infoTitle;
      document.getElementById("infoContent").innerHTML = t.infoContent;
      document.getElementById("aboutTitle").textContent = t.aboutTitle;
      document.getElementById("aboutContent").textContent = t.aboutContent;
      document.getElementById("footerText").innerHTML = t.footerText;

      document.querySelectorAll(".language-link").forEach((link) => {
        const isActive = link.dataset.lang === currentLang;
        if (isActive) {
          link.setAttribute("aria-current", "true");
        } else {
          link.removeAttribute("aria-current");
        }
      });
    }

    function updateLanguageUrl() {
      const url = new URL(window.location.href);

      if (currentLang === "es") {
        url.searchParams.delete("lang");
      } else {
        url.searchParams.set("lang", currentLang);
      }

      window.history.replaceState({}, "", url);
    }

    function changeLanguage(nextLang) {
      currentLang = nextLang;
      updateLanguageUrl();
      applyLanguage();

      if (document.getElementById("result").innerHTML.trim()) {
        calculate();
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("bridgeForm");
      const urlLang = new URLSearchParams(window.location.search).get("lang");
      const languageLinks = document.querySelectorAll(".language-link");

      if (urlLang && langData[urlLang]) {
        currentLang = urlLang;
      }

      const dateInput = document.getElementById("dateInput");

      function maskFromDigits(digits) {
        const d = (digits + "________").slice(0, 8);
        return `${d.slice(0, 2)}/${d.slice(2, 4)}/${d.slice(4, 8)}`;
      }

      function digitsOnly(val) {
        return val.replace(/\D/g, "");
      }

      function placeCursor(input) {
        const pos = input.value.indexOf("_");
        input.setSelectionRange(pos !== -1 ? pos : 10, pos !== -1 ? pos : 10);
      }

      dateInput.addEventListener("focus", () => {
        if (dateInput.value === "") dateInput.value = maskFromDigits("");
        setTimeout(() => placeCursor(dateInput), 0);
      });

      dateInput.addEventListener("blur", () => {
        if (digitsOnly(dateInput.value) === "") dateInput.value = "";
      });

      dateInput.addEventListener("keydown", (e) => {
        if (e.key === "Backspace") {
          e.preventDefault();
          const newDigits = digitsOnly(dateInput.value).slice(0, -1);
          dateInput.value = maskFromDigits(newDigits);
          placeCursor(dateInput);
        } else if (/^\d$/.test(e.key)) {
          e.preventDefault();
          const digits = digitsOnly(dateInput.value);
          if (digits.length < 8) {
            dateInput.value = maskFromDigits(digits + e.key);
            placeCursor(dateInput);
          }
        }
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        calculate();
      });

      languageLinks.forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          changeLanguage(link.dataset.lang);
        });
      });

      applyLanguage();
    });
  </script>
</body>
</html>
